repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: bump-version
        name: Bump patch version
        entry: .githooks/bump-version.sh
        language: script
        pass_filenames: false
        always_run: true
