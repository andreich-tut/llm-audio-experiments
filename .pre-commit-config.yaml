repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pycqa/pylint
    rev: v3.3.4
    hooks:
      - id: pylint
        args: [--rcfile=.pylintrc]

  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        entry: bash -c 'cd webapp && npm run lint'
        language: system
        files: ^webapp/src/.*\.[jt]sx?$
        pass_filenames: false

      - id: typecheck
        name: TypeScript typecheck (frontend)
        entry: bash -c 'cd webapp && npm run typecheck'
        language: system
        files: ^webapp/src/.*\.[jt]sx?$
        pass_filenames: false

      - id: bump-version
        name: Bump patch version
        entry: .githooks/bump-version.sh
        language: script
        pass_filenames: false
        always_run: true
